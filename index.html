<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F172A" />
  <title>BREGPersonal</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">BREGPersonal</p>
        <h1 id="page-title">Dashboard</h1>
      </div>
      <button id="status-button" class="status-chip">Offline</button>
    </header>

    <main id="main-content" class="content"></main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-view="dashboard">Dashboard</button>
      <button class="nav-item" data-view="register">Registrar</button>
      <button class="nav-item" data-view="history">Historial</button>
      <button class="nav-item" data-view="vault">Vault</button>
      <button class="nav-item" data-view="profile">Perfil</button>
    </nav>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(() => console.log('[SW] Registered'))
        .catch(err => console.error('[SW] Error:', err));
    }
  </script>
</body>
</html>
